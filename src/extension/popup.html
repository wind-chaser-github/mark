<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #18181b 0%, #09090b 100%);
      color: #fafafa;
      padding: 24px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }
    .bg-glow {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.05), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn {
      background: #6366f1;
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .btn:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }
    .btn:disabled {
      background: #27272a;
      color: #71717a;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      border-color: transparent;
    }
    .btn-outline {
      background: transparent;
      color: #a855f7;
      border: 1px solid rgba(168, 85, 247, 0.4);
      margin-top: -8px;
    }
    .btn-outline:hover {
      background: rgba(168, 85, 247, 0.1);
      box-shadow: none;
    }
    .status {
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      font-weight: 500;
    }
    .success { color: #34d399; }
    .error { color: #f87171; }
    .loading { color: #a1a1aa; }
    
    .hint {
      font-size: 11px;
      color: #52525b;
      text-align: center;
      margin-top: -4px;
      background: rgba(255,255,255,0.03);
      padding: 6px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>✨ Mark.AI</h2>
      <a href="options.html" target="_blank" style="text-decoration: none; font-size: 16px; opacity: 0.8; transition: opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8" title="打开设置">⚙️</a>
    </div>
    <p style="font-size: 13px; color: #a1a1aa; margin: 0 0 4px 0; line-height: 1.6;">
      一键深度解析当前网页内容，并存入你的专属知识库。
    </p>
    <button id="save-btn" class="btn">收录当前网页</button>
    <button id="organize-btn" class="btn btn-outline" style="color: #34d399; border-color: rgba(52, 211, 153, 0.4);">🔮 自动整理散落书签</button>
    <button id="import-btn" class="btn btn-outline">一键导入所有浏览器书签</button>
    <div id="status" class="status"></div>
    <div id="import-progress" style="display: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; width: 100%; margin-top: -8px; overflow: hidden;">
      <div id="import-bar" style="background: linear-gradient(to right, #818cf8, #c084fc); width: 0%; height: 100%; transition: width 0.3s ease;"></div>
    </div>
    <div class="hint">💡 建议使用快捷键: Cmd/Ctrl + Shift + S</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
