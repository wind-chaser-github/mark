<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mark 智能书签管家设置</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; line-height: 1.6; color: #333; }
    h1 { font-size: 20px; border-bottom: 1px solid #eaeaea; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 500; margin-bottom: 5px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .btn { background-color: #000; color: #fff; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 10px; }
    .btn:hover { background-color: #333; }
    .status { margin-top: 15px; font-weight: bold; color: green; display: none; }
    .help-text { font-size: 12px; color: #666; margin-top: 4px; display: block; }
  </style>
</head>
<body>
  <h1>Mark 智能书签管家 - 设置</h1>
  
  <div class="form-group">
    <label for="apiKey">OpenAI API Key (必需)</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <span class="help-text">填入你的 API Key，用于直接在浏览器内整理书签。</span>
  </div>
  
  <div class="form-group">
    <label for="baseUrl">OpenAI Base URL (可选)</label>
    <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
    <span class="help-text">如果你使用代理，请填入代理地址（如: https://api.moonshot.cn/v1）。</span>
  </div>
  
  <div class="form-group">
    <label for="model">Model (可选)</label>
    <input type="text" id="model" placeholder="gpt-4o-mini">
    <span class="help-text">填入使用的模型，例如 gpt-3.5-turbo, gpt-4o 等。</span>
  </div>

  <div class="form-group">
    <label for="syncUrl">云端同步服务地址 (可选)</label>
    <input type="text" id="syncUrl" placeholder="http://localhost:3999">
    <span class="help-text">如果你开启了本地 Next.js 服务或将 Mark 部署在了云端，请填入地址进行数据同步。</span>
  </div>

  <div class="form-group">
    <label for="accessPassword">云端访问密码 (Access Password) (可选)</label>
    <input type="password" id="accessPassword" placeholder="你的服务密码">
    <span class="help-text">如果你在 Vercel 环境变量配置了 ACCESS_PASSWORD，请在此填写。</span>
  </div>
  
  <button id="save" class="btn">保存设置</button>
  <div id="status" class="status">✅ 保存成功！</div>

  <script src="options.js"></script>
</body>
</html>
